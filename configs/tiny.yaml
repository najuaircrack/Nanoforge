
model:
  vocab_size: 4000

  max_seq_len: 512

  d_model: 384
  n_layers: 6

  n_heads: 6
  n_kv_heads: 2

  ffn_hidden_mult: 4.0

  dropout: 0.1

  rope_theta: 10000.0
  norm_eps: 1.0e-5

  tie_embeddings: true

  use_flash: false

  activation: swiglu

  moe: null

training:
  run_name: tiny-bpe

  output_dir: runs/tiny-bpe

  seed: 1337

  max_steps: 50000

  batch_size: 4
  micro_batch_size: 1
  grad_accum_steps: 4

  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5

  warmup_steps: 1000

  optimizer: adamw

  weight_decay: 0.1

  betas: [0.9, 0.95]
  eps: 1.0e-8

  grad_clip: 1.0

  precision: auto

  gradient_checkpointing: false

  eval_interval: 500
  eval_steps: 20

  save_interval: 2000

  early_stopping_patience: 99999

  ema_decay: 0.0

  log_interval: 10

  tensorboard: true
  wandb: false

data:
  train_path: data/packed/tiny/train.bin
  val_path: data/packed/tiny/val.bin

  tokenizer_type: bpe
  tokenizer_path: data/tokenizers/tiny-bpe.json

  seq_len:   128

  num_workers: 0

  pin_memory: false

inference:
  max_new_tokens: 128

  temperature: 0.7

  top_k: 40

  top_p: 0.95

  repetition_penalty: 1.1

