model:
  vocab_size: 32000
  max_seq_len: 4096
  d_model: 768
  n_layers: 12
  n_heads: 12
  n_kv_heads: 4
  ffn_hidden_mult: 2.67
  dropout: 0.0
  rope_theta: 1000000.0
  rope_scaling:
    type: yarn
    factor: 2.0
    original_max_position_embeddings: 4096
  norm_eps: 1.0e-5
  tie_embeddings: true
  use_flash: true
  activation: swiglu
  sliding_window: null
  moe: null

training:
  run_name: code-110m
  output_dir: runs/code-110m
  seed: 1337
  max_steps: 120000
  batch_size: 128
  micro_batch_size: 4
  grad_accum_steps: 32
  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  warmup_steps: 2000
  optimizer: adamw
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  precision: bf16
  gradient_checkpointing: true
  eval_interval: 1000
  eval_steps: 100
  save_interval: 2000
  early_stopping_patience: 20
  ema_decay: 0.999
  log_interval: 20
  tensorboard: true
  wandb: false

data:
  train_path: data/packed/code/train.bin
  val_path: data/packed/code/val.bin
  tokenizer_path: tokenizers/code-bpe.json
  tokenizer_type: bpe
  seq_len: 4096
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true

inference:
  max_new_tokens: 512
  temperature: 0.7
  top_k: 80
  top_p: 0.95
  repetition_penalty: 1.08
