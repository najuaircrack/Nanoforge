model:
  vocab_size: 16000
  max_seq_len: 512         # keep 512 — saves memory and CPU time
  d_model: 256             # ← shrink from 384, cuts ~55% of compute
  n_layers: 4              # ← shrink from 6
  n_heads: 4               # ← match d_model (256/4=64 head_dim, good)
  n_kv_heads: 2
  ffn_hidden_mult: 2.67
  dropout: 0.0
  rope_theta: 10000.0      # ← 500k theta is overkill for 512 ctx
  norm_eps: 1.0e-5
  tie_embeddings: true
  use_flash: false         # no CUDA, keep false
  activation: swiglu
  block_type: transformer
  attention_backend: sdpa
  normalization: rmsnorm
  position_embedding: rope
  quantization_backend: none
  gradient_checkpointing: false

inference:
  mode: chat
  max_new_tokens: 128
  temperature: 0.8
  top_k: 50
  top_p: 0.9
  min_p: 0.05
  repetition_penalty: 1.3        # ← increase from 1.1
  frequency_penalty: 0.15        # ← increase slightly
  presence_penalty: 0.1          # ← was 0.0, add small penalty
  no_repeat_ngram_size: 3        # ← was 4, tighter
  stop_on_repetition: true
  repetition_window: 32          # ← was 64, catch loops faster
  repetition_threshold: 0.6      # ← was 0.85, trigger sooner
  deterministic: false
  mirostat: false

training:
  mode: chat
  run_name: ultrachat-18m
  output_dir: runs/ultrachat-18m
  seed: 1337
  max_steps: 20000         # ← 50k is unrealistic on CPU, 20k is ~20-40hrs
  micro_batch_size: 1      # ← 1 is correct for CPU memory
  grad_accum_steps: 8      # ← effective batch = 8 seqs, reasonable
  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  warmup_steps: 500        # ← ~2.5% of 20k
  warmup_ratio: 0.0
  optimizer: adamw
  scheduler: cosine
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip: 1.0
  precision: fp32          # ← keep fp32 on CPU, bf16 is slower on Ryzen
  gradient_checkpointing: false  # no benefit on CPU, adds overhead
  eval_interval: 500
  eval_steps: 10           # ← was 20, eval is slow on CPU too
  save_interval: 1000
  early_stopping_patience: 10
  log_interval: 10
  tensorboard: true
  wandb: false
  compile: false           # torch.compile on CPU/Windows is unreliable
  low_memory: true         # ← enable this

data:
  train_path: data/packed/ultrachat/train.bin
  val_path: data/packed/ultrachat/val.bin
  tokenizer_type: native-bpe
  tokenizer_path: data/tokenizers/tiny-bpe.json
  seq_len: 512
  mode: chat
  loss_masking: assistant_only
  assistant_only_loss: true
  tokenizer_batch_size: 64   # ← lower for RAM
  num_workers: 0             # ← must be 0 on Windows
  pin_memory: false          # ← no CUDA, keep false